services:
  app:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "5001:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    depends_on:
      - app

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: knowledge_base
      POSTGRES_USER: knowledge_base
      POSTGRES_PASSWORD: secret
    volumes:
      - ../docker/pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge_base"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ../docker/minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (http://localhost:9001)

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
        /usr/bin/mc mb --ignore-existing local/laravel;
      "

