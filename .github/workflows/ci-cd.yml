name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: knowledge_base
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: knowledge_base_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U knowledge_base"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USERNAME: knowledge_base
      DB_PASSWORD: secret
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, zip
          coverage: none

      - run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - run: cp .env.example .env && php artisan key:generate

      # Tests\TestCase pins the connection to DB_TEST_DATABASE (knowledge_base_test);
      # the service above already created that DB. DB_HOST/PORT come from the job env.
      - run: php artisan test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.DEPLOY_PATH }} &&
            git pull origin main &&
            docker compose -f docker-compose.yml up --build -d &&
            docker compose -f docker-compose.yml exec -T app php artisan migrate --force &&
            docker compose -f docker-compose.yml exec -T app php artisan db:seed --class=AdminSeeder --force &&
            docker compose -f docker-compose.yml exec -T app php artisan l5-swagger:generate &&
            docker compose -f docker-compose.yml restart nginx
          "
